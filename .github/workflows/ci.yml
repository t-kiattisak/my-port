name: CI/CD GitOps Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the API source code
      - name: Checkout API Repo
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build and Push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            tkiattisakj9/my-port-api:${{ github.sha }}
            tkiattisakj9/my-port-api:latest

      # Step 4: Checkout the GitOps Config repository (t-kiattisak/argo)
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: t-kiattisak/argo
          token: ${{ secrets.GITOPS_PAT }}
          path: argo-gitops

      # Step 5: Update the Docker image tag and annotations in the GitOps repository
      - name: Update Image Tag and Annotations in GitOps Manifest
        run: |
          cd argo-gitops
          # Update the Docker image tag using yq (cleaner and safer than sed)
          yq -i '.spec.template.spec.containers[0].image = "tkiattisakj9/my-port-api:${{ github.sha }}"' apps/base/my-api/deployment.yaml
          
          # Inject metadata annotations for Git traceability
          yq -i '.metadata.annotations."git/commit-sha" = "${{ github.sha }}"' apps/base/my-api/deployment.yaml
          yq -i '.metadata.annotations."git/author" = "${{ github.actor }}"' apps/base/my-api/deployment.yaml
          yq -i '.metadata.annotations."git/build-url" = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"' apps/base/my-api/deployment.yaml

      # Step 6: Commit and Push changes back to the GitOps repository
      - name: Commit and Push Changes to GitOps
        run: |
          cd argo-gitops
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/base/my-api/deployment.yaml
          git diff-index --quiet HEAD || git commit -m "chore: update my-api image tag to ${{ github.sha }} [skip ci]"
          git push origin main
